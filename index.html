<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- add the font family of your choice -->
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <!-- Header Section -->
    <header>
      <h1>Media Player Website</h1>
    </header>

    <!-- Navigation Section -->
    <nav>
      <ul>
        <li><a href="#">Mopa</a></li>
        <!-- Add or remove navigation items as needed -->
      </ul>
    </nav>

    <!-- Main Content Section -->
    <main class="container">
      <!-- Media Player Section -->
      <div class="media-player">
        <video id="custom-video-player" controls crossOrigin="anonymous" loop> <! added loop attribute to enable continuous playback -->
          <source
            src="https://thelongesthumstore.sgp1.cdn.digitaloceanspaces.com/IM-2250/miac.mp4"
            type="video/mp4"
          />
        </video>
        <div class="custom-controls">
          <button id="play-pause-btn" onclick="togglePlayPause()">
            <img
              id="play-pause-img"
              src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
              alt="Play Button"
              width="24"
              height="24"
              style="filter: hue-rotate(60deg) brightness(1.2);"
            />
          </button>
          <!-- add the missing buttons or functionality here -->
          <div class="progress-bar">
            <span id="progress-bar-fill"></span>
          </div>
          <img id="volume-icon"
           src="https://img.icons8.com/?size=100&id=reqgj3e1uKBy&format=png&color=FFFF00"
            alt="Volume Icon" 
            width="24" height="24" 
            style="cursor: pointer;" onclick="toggleMute()"
          />
          <div class = full screen>
          <button id="fullscreen-btn" onclick="toggleFullScreen()">
            <img
              src="https://img.icons8.com/?size=100&id=69155&format=png&color=000000"
              alt="Fullscreen Button"
              width="24"
              height="24"
              style="cursor: pointer;"
            />
          </button>
        </div> 
      </div>
      

      
      <!-- Additional Content Section -->
      <section>
        <h2>+++++</h2>
        <p></p>
        <!-- Add more content as needed -->
      </section>
    </main>

    <!-- Video Buttons Section -->
   <div class="video-buttons">
        <button class="video-btn" onclick="changeVideo('https://thelongesthumstore.sgp1.cdn.digitaloceanspaces.com/IM-2250/miac.mp4')">
          <img src="musicvideo.png" alt="Video 1 Thumbnail" width="100" height="60" />
        </button>
        
        <button class="video-btn" onclick="changeVideo('https://thelongesthumstore.sgp1.cdn.digitaloceanspaces.com/IM-2250/berry-bunch_handheld-windmill-fan.mp4')">
          <img src="video2im.png" alt="Video 2 Thumbnail" width="100" height="60" />
        </button>
        
        <button class="video-btn" onclick="changeVideo('videoplayback.mp4')"> <!-- video is copyright free from https://www.youtube.com/watch?v=DzYp5uqixz0&list=PLfP6i5T0-DkJPT4dkMAr0PwRq1m25UtoO -->
          <img src="video3im.png" alt="Video 3 Thumbnail" width="100" height="60" />
        </button>
    </div>

    <!-- Footer Section -->
    <footer>
      <p>&copy; 2024 Media Player Website. All rights reserved.</p>
      <a href="https://icons8.com/icon/59862/play">Play</a> icon by
      <a href="https://icons8.com">Icons8</a>
      <a href="https://icons8.com/icon/61012/pause">Pause</a> icon by
      <a href="https://icons8.com">Icons8</a>
    </footer>
  </body>
</html>
